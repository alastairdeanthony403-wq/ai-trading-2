<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        /* ===== LAYOUT ===== */
        .top-bar {
            display: flex;
            justify-content: space-around;
            background: #111827;
            padding: 10px;
        }

        .main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            height: 60vh;
        }

        .left, .right {
            padding: 10px;
            overflow-y: auto;
        }

        .bottom {
            height: 40vh;
            overflow-y: auto;
            padding: 10px;
        }

        /* ===== CARDS ===== */
        .card {
            background: #1e293b;
            padding: 12px;
            margin: 8px;
            border-radius: 10px;
        }

        .buy { color: #22c55e; }
        .sell { color: #ef4444; }
        .hold { color: #facc15; }

        /* ===== PROFIT BAR ===== */
        .bar {
            height: 6px;
            background: #111;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .fill {
            height: 100%;
        }

        .green { background: #22c55e; }
        .red { background: #ef4444; }

        /* ===== CONFIDENCE BAR ===== */
        .conf-bar {
            height: 8px;
            background: #111;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 6px;
        }

        .conf-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s ease;
        }

        .conf-green { background: #22c55e; }
        .conf-yellow { background: #facc15; }
        .conf-red { background: #ef4444; }

        /* ===== BLINK ===== */
        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* ===== INPUT ===== */
        .controls {
            text-align: center;
            margin-bottom: 10px;
        }

        input, button {
            padding: 8px;
            margin: 4px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
        }
    </style>
</head>

<body>

<h1>🚀 AI Trading Terminal</h1>

<div class="controls">
    <input id="symbols" value="BTCUSDT,ETHUSDT,AAPL">
    <input id="rr" value="2">
    <button onclick="saveConfig()">Save</button>
</div>

<!-- ===== TOP STATS ===== -->
<div class="top-bar">
    <div>Total PnL: <span id="totalPnL">0</span></div>
    <div>Trades: <span id="totalTrades">0</span></div>
    <div>Win Rate: <span id="winRate">0%</span></div>
</div>

<!-- ===== MAIN GRID ===== -->
<div class="main">

    <!-- LEFT: SIGNALS -->
    <div class="left">
        <h3>📊 Signals</h3>
        <div id="signals"></div>
    </div>

    <!-- RIGHT: BEST -->
    <div class="right">
        <h3>🔥 Best Trade</h3>
        <div id="best"></div>
    </div>

</div>

<!-- ===== CHARTS ===== -->
<div class="bottom">
    <h3>📉 Charts</h3>
    <div id="charts"></div>
</div>

<script>
const API = "/signal";

function safe(n){ return n ?? 0; }

function getColor(s){
    return s==="BUY"?"buy":s==="SELL"?"sell":"hold";
}

function getConfidenceClass(conf){
    if(conf >= 80) return "conf-green";
    if(conf >= 50) return "conf-yellow";
    return "conf-red";
}

function loadData(){
    fetch(API)
    .then(r=>r.json())
    .then(data=>{

        let totalPnL = 0;
        let wins = 0;

        // ===== BEST TRADE =====
        if(data.best_trade){
            let b = data.best_trade;

            document.getElementById("best").innerHTML = `
                <div class="card">
                    <h2>${b.symbol}</h2>
                    <p class="${getColor(b.signal)}">${b.signal}</p>

                    <p>Live: <span class="blink">${safe(b.live_price).toFixed(2)}</span></p>

                    <!-- CONFIDENCE -->
                    <div class="conf-bar">
                        <div class="conf-fill ${getConfidenceClass(safe(b.confidence))}"
                             style="width:${safe(b.confidence)}%">
                        </div>
                    </div>
                    <p>Confidence: ${safe(b.confidence)}%</p>

                    <p>TP: ${b.take_profit}</p>
                    <p>SL: ${b.stop_loss}</p>
                </div>
            `;
        }

        // ===== SIGNALS =====
        let html = "";

        data.all_signals.forEach(s=>{
            let pnl = safe(s.pnl);
            totalPnL += pnl;
            if(pnl > 0) wins++;

            html += `
            <div class="card">
                <b>${s.symbol}</b>
                <p class="${getColor(s.signal)}">${s.signal}</p>

                <p>Live: <span class="blink">${safe(s.live_price).toFixed(2)}</span></p>

                <!-- CONFIDENCE -->
                <div class="conf-bar">
                    <div class="conf-fill ${getConfidenceClass(safe(s.confidence))}"
                         style="width:${safe(s.confidence)}%">
                    </div>
                </div>
                <p>Confidence: ${safe(s.confidence)}%</p>

                <p>PnL: ${pnl.toFixed(2)}</p>

                <!-- PNL BAR -->
                <div class="bar">
                    <div class="fill ${pnl>=0?'green':'red'}"
                         style="width:${Math.min(Math.abs(pnl),100)}%">
                    </div>
                </div>
            </div>
            `;
        });

        document.getElementById("signals").innerHTML = html;

        // ===== STATS =====
        let trades = data.all_signals.length;
        let winRate = trades ? ((wins/trades)*100).toFixed(1) : 0;

        document.getElementById("totalPnL").innerText = totalPnL.toFixed(2);
        document.getElementById("totalTrades").innerText = trades;
        document.getElementById("winRate").innerText = winRate + "%";

        // ===== CHARTS =====
        loadCharts(document.getElementById("symbols").value.split(","));
    });
}

function saveConfig(){
    fetch("/symbols",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            symbols: document.getElementById("symbols").value.split(","),
            risk_reward: document.getElementById("rr").value
        })
    });
    loadData();
}

function loadCharts(symbols){
    let html="";

    symbols.forEach(s=>{
        html+=`
        <div class="card">
            <div id="tv_${s}" style="height:300px;"></div>
        </div>`;
    });

    document.getElementById("charts").innerHTML=html;

    setTimeout(()=>{
        symbols.forEach(s=>{
            new TradingView.widget({
                container_id:`tv_${s}`,
                width:"100%",
                height:300,
                symbol:s.includes("USDT")?"BINANCE:"+s:"NASDAQ:"+s,
                theme:"dark"
            });
        });
    },500);
}

setInterval(loadData,5000);
loadData();
</script>

</body>
</html>
