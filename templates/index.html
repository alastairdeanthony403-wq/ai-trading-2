<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Terminal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 { text-align: center; }

        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px;
        }

        .nav a button {
            background: #2563eb;
            padding: 8px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .top-bar {
            display: flex;
            justify-content: space-around;
            background: #111827;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            margin: 8px;
            border-radius: 10px;
        }

        .alerts {
            position: fixed;
            right: 10px;
            top: 10px;
            width: 250px;
        }

        .alert {
            background: #ef4444;
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>🚀 AI Trading Terminal</h1>

<!-- NAVIGATION -->
<div class="nav">
    <a href="/"><button>Dashboard</button></a>
    <a href="/charts"><button>Charts</button></a>
    <a href="/analytics"><button>Analytics</button></a>
    <a href="/realtime"><button>Realtime</button></a>
</div>

<!-- STATS -->
<div class="top-bar">
    <div>Balance: $<span id="balance">0</span></div>
    <div>Win Rate: <span id="winrate">0%</span></div>
    <div>Trades: <span id="trades">0</span></div>
</div>

<div id="signals"></div>

<!-- ALERT PANEL -->
<div class="alerts" id="alerts"></div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio>

<script>
const API = "/signal";

let lastSignals = {};

function loadData(){
    fetch(API)
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("balance").innerText = data.balance.toFixed(2);

        let wins = 0;

        let html = "";

        data.history.forEach(t=>{
            if(t.pnl > 0) wins++;
        });

        let winrate = data.history.length ? (wins/data.history.length*100).toFixed(1) : 0;

        document.getElementById("winrate").innerText = winrate + "%";
        document.getElementById("trades").innerText = data.history.length;

        data.all_signals.forEach(s=>{

            // ALERT SYSTEM
            if(lastSignals[s.symbol] && lastSignals[s.symbol] !== s.signal){
                triggerAlert(`${s.symbol} → ${s.signal}`);
            }

            lastSignals[s.symbol] = s.signal;

            html += `<div class="card">
                <b>${s.symbol}</b>
                <p>${s.signal}</p>
                <p>Price: ${s.live_price}</p>
            </div>`;
        });

        document.getElementById("signals").innerHTML = html;
    });
}

function triggerAlert(msg){
    let div = document.createElement("div");
    div.className = "alert";
    div.innerText = msg;

    document.getElementById("alerts").appendChild(div);

    document.getElementById("alertSound").play();

    setTimeout(()=>div.remove(), 5000);
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
