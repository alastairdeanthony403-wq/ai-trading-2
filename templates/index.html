<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Dashboard</title>

    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px;
            margin: 12px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .card:hover { transform: scale(1.02); }

        .buy {
            color: #22c55e;
            text-shadow: 0 0 8px #22c55e;
        }

        .sell {
            color: #ef4444;
            text-shadow: 0 0 8px #ef4444;
        }

        .hold { color: #facc15; }

        /* ✅ PROFIT BAR */
        .profit-bar {
            height: 10px;
            border-radius: 5px;
            margin-top: 8px;
            background: #111;
            overflow: hidden;
        }

        .profit-fill {
            height: 100%;
            transition: width 0.5s;
        }

        .green { background: #22c55e; }
        .red { background: #ef4444; }

        /* ✅ BLINK LIVE PRICE */
        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 AI Trading Dashboard</h1>

    <div class="card">
        <input id="symbols" value="BTCUSDT,ETHUSDT,AAPL,TSLA">
        <input id="rr" value="2">
        <button onclick="saveConfig()">Save</button>
    </div>

    <h2>🔥 Best Trade</h2>
    <div id="best"></div>

    <h2>📊 All Signals</h2>
    <div id="signals" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:10px;"></div>

    <div id="charts"></div>

</div>

<script>
const API = "/signal";

function getColor(signal) {
    if (signal === "BUY") return "buy";
    if (signal === "SELL") return "sell";
    return "hold";
}

function getPnLColor(pnl) {
    return pnl >= 0 ? "buy" : "sell";
}

function getConfidenceColor(conf) {
    if (conf >= 80) return "#22c55e";
    if (conf >= 50) return "#facc15";
    return "#ef4444";
}

function safe(num) {
    return num !== undefined && num !== null ? num : 0;
}

function loadData() {
    fetch(API)
    .then(res => res.json())
    .then(data => {

        // ================= BEST TRADE =================
        if (!data.best_trade) {
            document.getElementById("best").innerHTML = `
                <div class="card">
                    <p>No strong trades right now</p>
                </div>
            `;
        } else {
            const b = data.best_trade;

            document.getElementById("best").innerHTML = `
                <div class="card">
                    <h3>${b.symbol}</h3>
                    <p class="${getColor(b.signal)}">${b.signal}</p>

                    <p>Price: ${b.price}</p>
                    <p>Live: <span class="blink">${safe(b.live_price).toFixed(2)}</span></p>

                    <p>SL: ${b.stop_loss}</p>
                    <p>TP: ${b.take_profit}</p>

                    <div class="profit-bar">
                        <div class="profit-fill ${b.pnl >= 0 ? 'green' : 'red'}"
                             style="width:${Math.min(Math.abs(safe(b.pnl)), 100)}%">
                        </div>
                    </div>

                    <p class="${getPnLColor(b.pnl)}">
                        PnL: ${safe(b.pnl).toFixed(2)}
                    </p>

                    <p style="color:${getConfidenceColor(safe(b.confidence))}">
                        Confidence: ${safe(b.confidence)}%
                    </p>
                </div>
            `;
        }

        // ================= ALL SIGNALS =================
        let html = "";

        data.all_signals.forEach(s => {
            html += `
                <div class="card">
                    <h3>${s.symbol}</h3>
                    <p class="${getColor(s.signal)}">${s.signal}</p>

                    <p>Price: ${s.price}</p>
                    <p>Live: <span class="blink">${safe(s.live_price).toFixed(2)}</span></p>

                    <p>SL: ${s.stop_loss}</p>
                    <p>TP: ${s.take_profit}</p>

                    <div class="profit-bar">
                        <div class="profit-fill ${s.pnl >= 0 ? 'green' : 'red'}"
                             style="width:${Math.min(Math.abs(safe(s.pnl)), 100)}%">
                        </div>
                    </div>

                    <p class="${getPnLColor(s.pnl)}">
                        PnL: ${safe(s.pnl).toFixed(2)}
                    </p>

                    <p style="color:${getConfidenceColor(safe(s.confidence))}">
                        Confidence: ${safe(s.confidence)}%
                    </p>
                </div>
            `;
        });

        document.getElementById("signals").innerHTML = html;

        // ================= CHARTS =================
        const symbols = document.getElementById("symbols").value.split(",");
        loadCharts(symbols);
    });
}

function saveConfig() {
    const symbols = document.getElementById("symbols").value.split(",");
    const rr = document.getElementById("rr").value;

    fetch("/symbols", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            symbols: symbols,
            risk_reward: rr
        })
    });

    loadData();
}

function loadCharts(symbols) {
    let html = "";

    symbols.forEach(symbol => {
        html += `
        <div class="card">
            <h3>${symbol} Chart</h3>
            <div id="tv_${symbol}" style="height:400px;"></div>
        </div>
        `;
    });

    document.getElementById("charts").innerHTML = html;

    setTimeout(() => {
        symbols.forEach(symbol => {
            new TradingView.widget({
                container_id: `tv_${symbol}`,
                width: "100%",
                height: 400,
                symbol: symbol.includes("USDT")
                    ? "BINANCE:" + symbol
                    : "NASDAQ:" + symbol,
                interval: "60",
                theme: "dark",
                style: "1"
            });
        });
    }, 500);
}

// AUTO REFRESH
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
