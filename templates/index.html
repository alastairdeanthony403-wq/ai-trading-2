<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-around;
            background: #111827;
            padding: 10px;
        }

        .main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            height: 55vh;
        }

        .left, .right {
            padding: 10px;
            overflow-y: auto;
        }

        .bottom {
            height: 45vh;
            overflow-y: auto;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 12px;
            margin: 8px;
            border-radius: 10px;
        }

        .buy { color: #22c55e; }
        .sell { color: #ef4444; }
        .hold { color: #facc15; }

        .bar, .confidence-bar {
            height: 6px;
            background: #111;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        .green { background: #22c55e; }
        .red { background: #ef4444; }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg,#22c55e,#4ade80);
            transition: width 0.5s ease;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        input, button {
            padding: 8px;
            margin: 4px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
        }
    </style>
</head>

<body>

<h1>🚀 AI Trading Terminal</h1>

<div class="controls" style="text-align:center;">
    <input id="symbols" value="BTCUSDT,ETHUSDT,AAPL">
    <input id="rr" value="2">
    <button onclick="saveConfig()">Save</button>
</div>

<!-- ===== ACCOUNT STATS ===== -->
<div class="top-bar">
    <div>Balance: $<span id="balance">10000</span></div>
    <div>Total PnL: <span id="totalPnL">0</span></div>
    <div>Trades: <span id="totalTrades">0</span></div>
    <div>Win Rate: <span id="winRate">0%</span></div>
</div>

<div class="main">

    <!-- LEFT -->
    <div class="left">
        <h3>📊 Signals</h3>
        <div id="signals"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>🔥 Best Trade</h3>
        <div id="best"></div>

        <h3>📜 Trade History</h3>
        <div id="history"></div>
    </div>

</div>

<div class="bottom">
    <h3>📉 Charts</h3>
    <div id="charts"></div>
</div>

<script>
const API = "/signal";

// ===== LOCAL STORAGE =====
let balance = parseFloat(localStorage.getItem("balance")) || 10000;
let history = JSON.parse(localStorage.getItem("history") || "[]");

function saveStorage() {
    localStorage.setItem("balance", balance);
    localStorage.setItem("history", JSON.stringify(history));
}

function safe(n){ return n ?? 0; }

function getColor(s){
    return s==="BUY"?"buy":s==="SELL"?"sell":"hold";
}

function loadData(){
    fetch(API)
    .then(r=>r.json())
    .then(data=>{

        let totalPnL = 0;
        let wins = 0;

        // ===== BEST TRADE =====
        if(data.best_trade){
            let b = data.best_trade;

            document.getElementById("best").innerHTML = `
                <div class="card">
                    <h2>${b.symbol}</h2>
                    <p class="${getColor(b.signal)}">${b.signal}</p>
                    <p>Live: <span class="blink">${safe(b.live_price).toFixed(2)}</span></p>

                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width:${safe(b.confidence)}%"></div>
                    </div>

                    <p>Confidence: ${safe(b.confidence)}%</p>

                    <button onclick="executeTrade('${b.symbol}', ${b.live_price}, '${b.signal}')">
                        Execute Trade
                    </button>
                </div>
            `;
        }

        // ===== SIGNALS =====
        let html = "";

        data.all_signals.forEach(s=>{
            let pnl = safe(s.pnl);
            totalPnL += pnl;
            if(pnl > 0) wins++;

            html += `
            <div class="card">
                <b>${s.symbol}</b>
                <p class="${getColor(s.signal)}">${s.signal}</p>
                <p>Live: <span class="blink">${safe(s.live_price).toFixed(2)}</span></p>

                <div class="confidence-bar">
                    <div class="confidence-fill" style="width:${safe(s.confidence)}%"></div>
                </div>

                <p>PnL: ${pnl.toFixed(2)}</p>

                <div class="bar">
                    <div class="fill ${pnl>=0?'green':'red'}"
                         style="width:${Math.min(Math.abs(pnl),100)}%">
                    </div>
                </div>
            </div>
            `;
        });

        document.getElementById("signals").innerHTML = html;

        // ===== STATS =====
        let trades = history.length;
        let winRate = trades ? ((history.filter(t=>t.pnl>0).length / trades)*100).toFixed(1) : 0;

        document.getElementById("balance").innerText = balance.toFixed(2);
        document.getElementById("totalPnL").innerText = totalPnL.toFixed(2);
        document.getElementById("totalTrades").innerText = trades;
        document.getElementById("winRate").innerText = winRate + "%";

        renderHistory();

        loadCharts(document.getElementById("symbols").value.split(","));
    });
}

// ===== EXECUTE TRADE =====
function executeTrade(symbol, price, signal){
    let pnl = (Math.random() - 0.4) * 100; // simulate result

    balance += pnl;

    history.unshift({
        symbol,
        signal,
        entry: price,
        pnl: pnl.toFixed(2),
        time: new Date().toLocaleTimeString()
    });

    if(history.length > 20) history.pop();

    saveStorage();
    loadData();
}

// ===== HISTORY UI =====
function renderHistory(){
    let html = "";

    history.forEach(t=>{
        html += `
        <div class="card">
            ${t.symbol} | ${t.signal} <br>
            PnL: <span class="${t.pnl>=0?'buy':'sell'}">${t.pnl}</span><br>
            ${t.time}
        </div>
        `;
    });

    document.getElementById("history").innerHTML = html;
}

// ===== CONFIG =====
function saveConfig(){
    fetch("/symbols",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            symbols: document.getElementById("symbols").value.split(","),
            risk_reward: document.getElementById("rr").value
        })
    });
    loadData();
}

// ===== CHARTS =====
function loadCharts(symbols){
    let html="";

    symbols.forEach(s=>{
        html+=`
        <div class="card">
            <div id="tv_${s}" style="height:300px;"></div>
        </div>`;
    });

    document.getElementById("charts").innerHTML=html;

    setTimeout(()=>{
        symbols.forEach(s=>{
            new TradingView.widget({
                container_id:`tv_${s}`,
                width:"100%",
                height:300,
                symbol:s.includes("USDT")?"BINANCE:"+s:"NASDAQ:"+s,
                theme:"dark"
            });
        });
    },500);
}

setInterval(loadData,5000);
loadData();
</script>

</body>
</html>
