<!DOCTYPE html>
<html>
<head>
    <title>Trading Charts</title>
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #1e293b;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #22c55e;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>📊 Advanced Trading Charts</h1>

<div class="tabs">
    <button onclick="loadCategory('commodities')">🛢 Commodities</button>
    <button onclick="loadCategory('forex')">💱 Currencies</button>
    <button onclick="loadCategory('indices')">📊 Indices</button>
</div>

<div id="charts" class="charts"></div>

<script>
function loadCategory(type) {

    let symbols = [];

    if (type === "commodities") {
        symbols = [
            "TVC:GOLD",
            "TVC:SILVER",
            "NYMEX:CL1!",   // Oil
            "CBOT:ZC1!"     // Corn
        ];
    }

    if (type === "forex") {
        symbols = [
            "FX:EURUSD",
            "FX:GBPUSD",
            "FX:USDJPY",
            "FX:AUDUSD"
        ];
    }

    if (type === "indices") {
        symbols = [
            "FOREXCOM:SPXUSD",  // S&P 500
            "FOREXCOM:NSXUSD",  // Nasdaq
            "FOREXCOM:DJI",     // Dow Jones
            "FOREXCOM:UK100"    // FTSE
        ];
    }

    let html = "";

    symbols.forEach((s, i) => {
        html += `
        <div class="card">
            <div id="tv_${i}" style="height:300px;"></div>
        </div>
        `;
    });

    document.getElementById("charts").innerHTML = html;

    setTimeout(() => {
        symbols.forEach((s, i) => {
            new TradingView.widget({
                container_id: `tv_${i}`,
                width: "100%",
                height: 300,
                symbol: s,
                interval: "60",
                theme: "dark",
                style: "1"
            });
        });
    }, 500);
}

// Load default
loadCategory("commodities");
</script>

</body>
</html>
