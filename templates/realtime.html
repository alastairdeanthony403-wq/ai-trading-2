<!DOCTYPE html>
<html>
<head>
    <title>Realtime Trading</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 10px;
        }

        .nav {
            text-align: center;
        }

        .nav button {
            margin: 5px;
            padding: 8px 12px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
        }

        .up { color: #22c55e; }
        .down { color: #ef4444; }
    </style>
</head>

<body>

<h1>⚡ Realtime Market</h1>

<div class="nav">
    <a href="/"><button>🏠 Home</button></a>
    <a href="/analytics"><button>📊 Analytics</button></a>
    <a href="/charts"><button>📉 Charts</button></a>
</div>

<div class="grid" id="market"></div>

<script>
const symbols = ["btcusdt","ethusdt"];
let prices = {};
let signals = {};

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ================= CREATE UI =================
symbols.forEach(s=>{
    let div = document.createElement("div");
    div.className = "card";
    div.id = s;

    div.innerHTML = `
        <h3>${s.toUpperCase()}</h3>
        <div id="signal_${s}">Signal: ...</div>
        <div class="price" id="price_${s}">0</div>
        <div id="pnl_${s}">PnL: 0</div>
    `;

    document.getElementById("market").appendChild(div);
});

// ================= WEBSOCKET =================
const streams = symbols.map(s => s + "@trade").join("/");
const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    const symbol = data.s.toLowerCase();
    const price = parseFloat(data.p);

    const el = document.getElementById("price_" + symbol);
    if(!el) return;

    let prev = prices[symbol] || price;

    // Direction color
    if(price > prev){
        el.className = "price up";
    } else if(price < prev){
        el.className = "price down";
    }

    el.innerText = price.toFixed(2);
    prices[symbol] = price;

    // 🔥 REAL-TIME PNL UPDATE
    updatePnL(symbol, price);
};

// ================= BACKEND SIGNAL SYNC =================
function loadSignals(){
    fetch("/live_signals")
    .then(r=>r.json())
    .then(data=>{

        data.forEach(s=>{
            let symbol = s.symbol.toLowerCase();

            let prevSignal = signals[symbol];

            signals[symbol] = s.signal;

            // Update UI
            document.getElementById("signal_" + symbol).innerText =
                "Signal: " + s.signal;

            // 🔔 ALERT ON CHANGE
            if(prevSignal && prevSignal !== s.signal){
                audio.play();
            }

            // Initial PnL
            document.getElementById("pnl_" + symbol).innerText =
                "PnL: " + s.pnl;
        });
    });
}

// ================= REAL-TIME PNL =================
function updatePnL(symbol, livePrice){
    let signal = signals[symbol];

    if(!signal) return;

    let pnlEl = document.getElementById("pnl_" + symbol);

    let basePrice = prices[symbol];

    if(!basePrice) return;

    let pnl = 0;

    if(signal === "BUY"){
        pnl = livePrice - basePrice;
    } else if(signal === "SELL"){
        pnl = basePrice - livePrice;
    }

    pnlEl.innerText = "PnL: " + pnl.toFixed(2);
}

// ================= LOOP =================
setInterval(loadSignals, 3000); // lightweight polling

loadSignals();
</script>

</body>
</html>
