<script>
const pages = ["dashboard","charts","analytics","realtime","backtester"];

function showPage(page) {
  pages.forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle("active", p === page);
  });

  document.querySelectorAll(".nav-link").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.page === page);
  });

  setTimeout(() => {
    if (page === "charts") loadMainChart();
    if (page === "backtester") loadBacktestChartData();
  }, 300);
}

/* ================= SAFE FETCH ================= */
async function fetchJSON(url, options) {
  try {
    const res = await fetch(url, options);

    if (!res.ok) {
      const txt = await res.text();
      console.error("API ERROR:", txt);
      throw new Error(txt);
    }

    return await res.json();

  } catch (err) {
    console.error("FETCH FAIL:", url, err);
    return { data: [] };
  }
}

/* ================= CHART ================= */
let mainChart, mainSeries;

function createMainChart() {
  const el = document.getElementById("mainChart");
  el.innerHTML = "";

  mainChart = LightweightCharts.createChart(el, {
    width: el.clientWidth || 800,
    height: 560,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" }
  });

  mainSeries = mainChart.addCandlestickSeries();

  window.addEventListener("resize", () => {
    mainChart.applyOptions({ width: el.clientWidth });
  });
}

async function loadMainChart() {
  const symbol = document.getElementById("chartSymbol").value;
  const interval = document.getElementById("chartInterval").value;

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbol}&interval=${interval}&limit=150`
  );

  // 🔥 CRITICAL FIX
  const candles = (res.data || []).map(c => ({
    time: Number(c.time),           // MUST be seconds
    open: Number(c.open),
    high: Number(c.high),
    low: Number(c.low),
    close: Number(c.close)
  }));

  if (!candles.length) {
    console.warn("No candles received");
    return;
  }

  mainSeries.setData(candles);
  mainChart.timeScale().fitContent();
}

/* ================= BACKTEST CHART ================= */
let btChart, btSeries;

function createBacktestChart() {
  const el = document.getElementById("btChart");
  el.innerHTML = "";

  btChart = LightweightCharts.createChart(el, {
    width: el.clientWidth || 800,
    height: 580,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" }
  });

  btSeries = btChart.addCandlestickSeries();

  window.addEventListener("resize", () => {
    btChart.applyOptions({ width: el.clientWidth });
  });
}

async function loadBacktestChartData() {
  const symbol = document.getElementById("btSymbol").value;
  const interval = document.getElementById("btInterval").value;

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbol}&interval=${interval}&limit=150`
  );

  const candles = (res.data || []).map(c => ({
    time: Number(c.time),
    open: Number(c.open),
    high: Number(c.high),
    low: Number(c.low),
    close: Number(c.close)
  }));

  if (!candles.length) return;

  btSeries.setData(candles);
  btChart.timeScale().fitContent();
}

/* ================= BACKTEST ================= */
async function runBacktest() {
  const btn = document.getElementById("runBacktestBtn");
  btn.disabled = true;

  try {
    const res = await fetchJSON("/api/backtest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbol: document.getElementById("btSymbol").value,
        interval: document.getElementById("btInterval").value,
        limit: Number(document.getElementById("btLimit").value),
        starting_balance: Number(document.getElementById("btStartingBalance").value)
      })
    });

    console.log("BACKTEST:", res);

  } catch (err) {
    console.error(err);
  }

  btn.disabled = false;
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  setTimeout(() => {
    createMainChart();
    createBacktestChart();
  }, 200); // 🔥 FIX for Render

  await loadMainChart();

  document.getElementById("chartRefreshBtn")
    .addEventListener("click", loadMainChart);

  document.getElementById("runBacktestBtn")
    .addEventListener("click", runBacktest);
});
</script>
