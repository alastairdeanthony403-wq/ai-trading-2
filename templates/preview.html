<script>
/* ================= SAFE DOM HELPERS ================= */
function el(id) {
  return document.getElementById(id);
}

/* ================= NAV ================= */
const pages = ["dashboard", "charts", "analytics", "realtime", "backtester"];

function showPage(page) {
  pages.forEach(p => {
    const pageEl = el(`page-${p}`);
    if (pageEl) pageEl.classList.toggle("active", p === page);
  });

  document.querySelectorAll(".nav-link").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.page === page);
  });

  setTimeout(() => {
    if (page === "charts") safeLoadMainChart();
    if (page === "backtester") safeLoadBacktestChart();
  }, 300);

  history.replaceState(null, "", page === "dashboard" ? "/" : `/${page}`);
}

/* Attach nav safely */
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".nav-link").forEach(btn => {
    btn.addEventListener("click", () => showPage(btn.dataset.page));
  });
});

/* ================= FETCH ================= */
async function fetchJSON(url, options) {
  try {
    const res = await fetch(url, options);
    const text = await res.text();
    const data = text ? JSON.parse(text) : {};

    if (!res.ok) throw new Error(data.error || "API error");

    return data;
  } catch (err) {
    console.error("API ERROR:", url, err);
    return {};
  }
}

/* ================= CHART ================= */
let mainChart = null;
let mainSeries = null;

function createMainChart() {
  const container = el("mainChart");
  if (!container || typeof LightweightCharts === "undefined") {
    console.warn("Chart container or lib missing");
    return;
  }

  container.innerHTML = "";

  mainChart = LightweightCharts.createChart(container, {
    width: container.clientWidth || 800,
    height: 560,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" },
    grid: {
      vertLines: { color: "rgba(255,255,255,0.05)" },
      horzLines: { color: "rgba(255,255,255,0.05)" }
    }
  });

  mainSeries = mainChart.addCandlestickSeries();

  window.addEventListener("resize", () => {
    if (mainChart) {
      mainChart.applyOptions({ width: container.clientWidth });
    }
  });
}

async function loadMainChart() {
  if (!mainSeries) return;

  const symbol = el("chartSymbol")?.value || "BTCUSDT";
  const interval = el("chartInterval")?.value || "1m";

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbol}&interval=${interval}&limit=150`
  );

  const candles = res.data || [];

  if (!candles.length) {
    console.warn("No candles");
    return;
  }

  mainSeries.setData(candles);
  mainChart.timeScale().fitContent();
}

/* SAFE wrapper (prevents crash on Render) */
function safeLoadMainChart() {
  try {
    if (!mainChart) createMainChart();
    loadMainChart();
  } catch (e) {
    console.error("Main chart failed:", e);
  }
}

/* ================= BACKTEST CHART ================= */
let btChart = null;
let btSeries = null;

function createBacktestChart() {
  const container = el("btChart");
  if (!container || typeof LightweightCharts === "undefined") {
    console.warn("Backtest chart container missing");
    return;
  }

  container.innerHTML = "";

  btChart = LightweightCharts.createChart(container, {
    width: container.clientWidth || 800,
    height: 580,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" }
  });

  btSeries = btChart.addCandlestickSeries();

  window.addEventListener("resize", () => {
    if (btChart) {
      btChart.applyOptions({ width: container.clientWidth });
    }
  });
}

async function loadBacktestChartData() {
  if (!btSeries) return;

  const symbol = el("btSymbol")?.value || "BTCUSDT";
  const interval = el("btInterval")?.value || "5m";

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbol}&interval=${interval}&limit=150`
  );

  const candles = res.data || [];

  if (!candles.length) return;

  btSeries.setData(candles);
  btChart.timeScale().fitContent();
}

function safeLoadBacktestChart() {
  try {
    if (!btChart) createBacktestChart();
    loadBacktestChartData();
  } catch (e) {
    console.error("Backtest chart failed:", e);
  }
}

/* ================= BACKTEST ================= */
async function runBacktest() {
  const btn = el("runBacktestBtn");
  if (btn) btn.disabled = true;

  try {
    const res = await fetchJSON("/api/backtest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbol: el("btSymbol")?.value || "BTCUSDT",
        interval: el("btInterval")?.value || "5m",
        limit: Number(el("btLimit")?.value || 200),
        strategy: el("btStrategy")?.value || "bot",
        starting_balance: Number(el("btStartingBalance")?.value || 1000)
      })
    });

    console.log("Backtest result:", res);

  } catch (err) {
    console.error("Backtest failed:", err);
  }

  if (btn) btn.disabled = false;
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  try {
    createMainChart();
    createBacktestChart();

    await loadMainChart();

    el("chartRefreshBtn")?.addEventListener("click", loadMainChart);
    el("runBacktestBtn")?.addEventListener("click", runBacktest);

  } catch (e) {
    console.error("INIT ERROR:", e);
  }
});
</script>
