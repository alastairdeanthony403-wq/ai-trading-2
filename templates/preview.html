<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= NAV ================= */
const pages = ["dashboard", "charts", "analytics", "realtime", "backtester"];

function showPage(page) {
  pages.forEach(p => {
    const el = document.getElementById(`page-${p}`);
    if (el) el.classList.toggle("active", p === page);
  });

  document.querySelectorAll(".nav-link").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.page === page);
  });

  setTimeout(() => {
    if (page === "charts") loadMainChart();
    if (page === "backtester") loadBacktestChartData();
  }, 300);

  history.replaceState(null, "", page === "dashboard" ? "/" : `/${page}`);
}

/* Attach nav AFTER DOM is ready */
document.querySelectorAll(".nav-link").forEach(btn => {
  btn.addEventListener("click", () => showPage(btn.dataset.page));
});

/* ================= HELPERS ================= */
async function fetchJSON(url, options) {
  try {
    const res = await fetch(url, options);
    const text = await res.text();
    const data = text ? JSON.parse(text) : {};

    if (!res.ok) throw new Error(data.error || "API error");
    return data;
  } catch (err) {
    console.error("API ERROR:", url, err);
    return {};
  }
}

/* ================= CHARTS ================= */
let mainChart, mainSeries;

function createMainChart() {
  const el = document.getElementById("mainChart");
  if (!el) return;

  el.innerHTML = "";

  mainChart = LightweightCharts.createChart(el, {
    width: el.clientWidth || 800,
    height: 560,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" }
  });

  mainSeries = mainChart.addCandlestickSeries();

  window.addEventListener("resize", () => {
    if (mainChart) mainChart.applyOptions({ width: el.clientWidth });
  });
}

async function loadMainChart() {
  if (!mainSeries) return;

  const symbolEl = document.getElementById("chartSymbol");
  const intervalEl = document.getElementById("chartInterval");

  if (!symbolEl || !intervalEl) return;

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbolEl.value}&interval=${intervalEl.value}&limit=150`
  );

  if (res.data?.length) {
    mainSeries.setData(res.data);
    mainChart.timeScale().fitContent();
  }
}

/* ================= BACKTEST ================= */
let btChart, btSeries;

function createBacktestChart() {
  const el = document.getElementById("btChart");
  if (!el) return;

  el.innerHTML = "";

  btChart = LightweightCharts.createChart(el, {
    width: el.clientWidth || 800,
    height: 580,
    layout: { background: { color: "#0f172a" }, textColor: "#cbd5e1" }
  });

  btSeries = btChart.addCandlestickSeries();
}

async function loadBacktestChartData() {
  if (!btSeries) return;

  const symbolEl = document.getElementById("btSymbol");
  const intervalEl = document.getElementById("btInterval");

  if (!symbolEl || !intervalEl) return;

  const res = await fetchJSON(
    `/api/chart-candles?symbol=${symbolEl.value}&interval=${intervalEl.value}&limit=150`
  );

  if (res.data?.length) {
    btSeries.setData(res.data);
    btChart.timeScale().fitContent();
  }
}

async function runBacktest() {
  const btn = document.getElementById("runBacktestBtn");
  if (!btn) return;

  btn.disabled = true;

  try {
    await fetchJSON("/api/backtest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbol: document.getElementById("btSymbol")?.value,
        interval: document.getElementById("btInterval")?.value,
        limit: Number(document.getElementById("btLimit")?.value),
        strategy: document.getElementById("btStrategy")?.value,
        starting_balance: Number(document.getElementById("btStartingBalance")?.value)
      })
    });
  } catch (err) {
    console.error(err);
  }

  btn.disabled = false;
}

/* ================= INIT ================= */
createMainChart();
createBacktestChart();
loadMainChart();

document.getElementById("chartRefreshBtn")?.addEventListener("click", loadMainChart);
document.getElementById("runBacktestBtn")?.addEventListener("click", runBacktest);

});
</script>
